<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Criar Conta - Hub Financeiro Pro</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    
    .gradient-pink {
      background: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
    }
    
    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-pink-50 to-purple-50 min-h-screen flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8 fade-in">
    <!-- Header -->
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center space-x-2 mb-4 text-gray-600 hover:text-pink-600 transition">
        <i class="fas fa-arrow-left"></i>
        <span>Voltar</span>
      </a>
      
      <div class="w-16 h-16 gradient-pink rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-user-plus text-white text-2xl"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-800">Criar Conta</h1>
      <p class="text-gray-600 mt-2">Comece a controlar suas finanças gratuitamente</p>
    </div>
    
    <!-- Register Form -->
    <form id="registerForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          <i class="fas fa-user mr-1"></i>
          Nome Completo
        </label>
        <input type="text" id="registerName" required
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent"
          placeholder="João da Silva">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          <i class="fas fa-envelope mr-1"></i>
          Email
        </label>
        <input type="email" id="registerEmail" required
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent"
          placeholder="seu@email.com">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          <i class="fas fa-lock mr-1"></i>
          Senha
        </label>
        <input type="password" id="registerPassword" required minlength="6"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent"
          placeholder="Mínimo 6 caracteres">
        
        <!-- Password Strength Indicator -->
        <div class="mt-2">
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs text-gray-600">Força da senha:</span>
            <span id="passwordStrengthLabel" class="text-xs font-semibold text-gray-400">-</span>
          </div>
          <div class="w-full bg-gray-200 rounded-full h-2">
            <div id="passwordStrengthBar" class="h-2 rounded-full transition-all" style="width: 0%; background-color: #EF4444"></div>
          </div>
          <p id="passwordFeedback" class="text-xs text-gray-500 mt-1"></p>
        </div>
      </div>
      
      <button type="submit" class="w-full gradient-pink text-white font-semibold py-3 rounded-lg hover:opacity-90 transition">
        <i class="fas fa-rocket mr-2"></i>
        Criar Conta Grátis
      </button>
    </form>
    
    <div id="authError" class="hidden mt-4 p-3 bg-red-50 text-red-700 rounded-lg text-sm"></div>
    <div id="authSuccess" class="hidden mt-4 p-3 bg-green-50 text-green-700 rounded-lg text-sm"></div>
    
    <div class="mt-6 text-center">
      <p class="text-sm text-gray-600">
        Já tem uma conta? 
        <a href="/login" class="text-pink-600 hover:text-pink-700 font-semibold">
          Faça login
        </a>
      </p>
    </div>
    
    <!-- Features -->
    <div class="mt-8 pt-6 border-t border-gray-200">
      <p class="text-xs text-gray-500 text-center mb-3">O que você ganha:</p>
      <div class="space-y-2 text-sm text-gray-600">
        <div class="flex items-center">
          <i class="fas fa-check-circle text-green-500 mr-2"></i>
          <span>Entrada rápida inteligente com IA</span>
        </div>
        <div class="flex items-center">
          <i class="fas fa-check-circle text-green-500 mr-2"></i>
          <span>Orçamentos e alertas automáticos</span>
        </div>
        <div class="flex items-center">
          <i class="fas fa-check-circle text-green-500 mr-2"></i>
          <span>Gráficos e análises em tempo real</span>
        </div>
        <div class="flex items-center">
          <i class="fas fa-check-circle text-green-500 mr-2"></i>
          <span>Múltiplas contas e cartões</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/register.js"></script>
</body>
</html>
